- name: Variable from inventry
  hosts: localhost
  become: yes
  connection: local
  tasks:
    - name: install nginx
      ansible.builtin.dnf:
        name: nginx
        state: latest
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Nginx only on Debian
      ansible.builtin.apt:
       name: nginx
       state: present
       when: ansible_facts['os_family'] == "Debian"
