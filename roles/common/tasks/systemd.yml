- name: Apply permission for application folder
  ansible.builtin.file:
    path: /app
    owner: appuser
    group: appuser
    recurse: yes
    mode: 'o-rwx'

- name: Copy SystemD Service file
  ansible.builtin.template:
    src:  '{{ component_name }}.service'
    dest: /etc/systemd/system/{{ component_name }}.service

- name: Start Service
  ansible.builtin.systemd_service:
    name: "{{ component_name }}"
    state: restarted
    enabled: yes
    daemon_reload: yes