- name: Create Application User
  ansible.builtin.user:
    name: appuser
    system: yes
    shell: /bin/false
    create_home: no

- name: Remove folder for application
  ansible.builtin.file:
    path: /app
    state: absent

- name: Create folder for application
  ansible.builtin.file:
    path: /app
    state: directory

- name: Download Application Content
  ansible.builtin.unarchive:
    src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/{{ component_name }}.zip
    dest: /app
    remote_src: yes

- name: install mysql
  when: schema_load | default('false') | bool
  ansible.builtin.include_role:
    name: common
    tasks_from: mysql-schema.yml

